version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: arabic-ai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-arabic_ai}
    ports:
      - "${POSTGRES_PORT:-4444}:${POSTGRES_PORT:-4444}"
    command: ["postgres", "-p", "${POSTGRES_PORT:-4444}", "-c", "logging_collector=on", "-c", "log_directory=/var/log/postgresql", "-c", "log_filename=postgresql.log"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs/db:/var/log/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -p ${POSTGRES_PORT:-4444} -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-arabic_ai}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: arabic-ai-backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgrespassword@db:4444/arabic_ai}
      - JWT_SECRET=${JWT_SECRET:-my-super-secret-jwt-key}
      - LONGCAT_API_KEY=${LONGCAT_API_KEY:-app-a7VrynbFBA1dhYc1RRCHjCFW}
    volumes:
      - ./logs/backend:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: arabic-ai-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    command: sh -c "mkdir -p /app/logs && node server.js > /app/logs/frontend.log 2>&1"
    volumes:
      - ./logs/frontend:/app/logs
    depends_on:
      - backend

  evaluation:
    build: ./evaluation
    container_name: arabic-ai-evaluation
    environment:
      - API_URL=http://backend:8000
      - FRONTEND_URL=http://frontend:3000
      - FASTSCRIBE_URL=${FASTSCRIBE_URL:-https://fastscribe.tarjama.com/api/asr/}
      - VISION_API_URL=${VISION_API_URL:-https://vision-api.arabic.ai/vision/extract}
      - LONGCAT_API_KEY=${LONGCAT_API_KEY:-app-a7VrynbFBA1dhYc1RRCHjCFW}
    volumes:
      - ./logs/evaluation:/app/logs
    depends_on:
      - backend
      - frontend
    profiles:
      - eval # Only run when explicitly requested via `docker compose --profile eval up`

volumes:
  postgres_data:
